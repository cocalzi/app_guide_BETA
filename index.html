        href="https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,200..900;1,200..900&family=Aldrich&family=Tilt+Neon&display=swap"

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DriveApp</title>

        type="image/x-icon">

<body>
    <main class="app-container">

        <div class="header-container-style">
            <header class="section-header">
                <h1 class="title">Drink&Drive #BETA</h1>

                <button id="themeBtn" class="theme-button-style"><span id="themeIcon" class="material-symbols-outlined"></span></button>

            </header>
        </div>
        <div class="input-group">
            <div class="dialog-position-input-style">
                <span class="material-symbols-outlined">
                    person_edit
                </span>
                <input id="name" placeholder=" Nome"> <input id="rememberName" type="checkbox"><label
                    for="rememberName"> Ricorda il nome </label>
            </div>
            <div class="dialog-position-input-style">
                <span class="material-symbols-outlined">
                    distance
                </span>
                <input id="km" placeholder=" Km" type="number"> <input id="rememberKm" type="checkbox"><label
                    for="rememberKm"> Ricorda i
                    km </label>
            </div>
        </div>

        <div class="actions-group">
            <button id="insertBtn" class="btn-style">Inserisci guida<span class="material-symbols-outlined">
                    add_circle
                </span></button>

            <button id="clearBtn" class="btn-clear-style">Cancella tutto<span class="material-symbols-outlined">
                    cancel
                </span></button>
        </div>

        <div class="table-wrapper">
            <table class="data-table">
                <!-- Icona bidone: <span class="material-symbols-outlined">delete_sweep</span> -->
                <thead>
                    <tr>
                        <th scope="col">Data</th>
                        <th scope="col">Ora</th>
                        <th scope="col">Km</th>
                        <th scope="col">Nome</th>
                        <th scope="col">Posizione</th>
                        <th scope="col">-</th>
                    </tr>
                </thead>

                <tbody id="tbody">

                </tbody>
            </table>
        </div>
    </main>
    <div id="loaderOverlay" class="overlay hidden">
        <p id="loadingString" class="loadingStringStyle"></p>
        <div class="spinner"></div>
    </div>

    <dialog id="dialog" class="dialog-style">
        <div class="dialog-title-style">
            <h3 class="dialog-title-style">Dettagli Posizione<span class="material-symbols-outlined">
                    location_on
                </span></h3>
        </div>
        <div id="dialogTextContainer" class="dialogInputTextContainer-style">
            <div class="dialog-position-input-style">
                <span class="material-symbols-outlined">
                    edit_note
                </span>
                <input id="dialogInputText" type="text"></input>
            </div>
            <p id="dialogText" class="dialogText-Style">Qui andrà il testo dinamico</p>
        </div>
        <div class="closeDialogBtn-container">
            <button id="closeAndSaveDialogBtn" class="dialogBtn-style">Salva e Chiudi</button>
            <button id="closeDialogBtn" class="dialogBtn-style">Chiudi</button>
        </div>
    </dialog>
    <dialog id="dialogClearBtn" class="dialog-style">
        <h3 class="dialog-title-style">Attenzione</h3>
        <div id="dialogTextContainer" class="dialogInputTextContainer-style">
            <p id="dialogText" class="dialogText-Style">Cancellare tutte le guide in memoria?</p>
        </div>
        <div class="closeDialogBtn-container">
            <button id="confirmClearBtn" class="dialogBtn-style">Sì</button>
            <button id="closeClearDialogBtn" class="dialogBtn-style">Annulla</button>
        </div>
    </dialog>
</body>

</html>
